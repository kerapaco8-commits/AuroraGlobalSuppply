
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="imgs/miniatura.png" />
    <title>Cargando | Loading...</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- SEO -->
	<meta name="description" content="Descripción de prueba de tu sitio web profesional."> 
	<meta name="keywords" content="servicios, soluciones, empresa, web"> 
	<meta name="author" content="Tu Empresa"> 
	<meta property="og:title" content="Mi Sitio Profesional"> 
	<meta property="og:description" content="Descripción atractiva para redes sociales"> 
	<meta property="og:type" content="website">
	<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
	<meta name="robots" content="index, follow">
	<meta name="description" content="Professional website demo with custom styles.">
	<meta name="robots" content="index, follow">
    
    <link rel="preload" href="imgs/banner1.jpg" as="image">
    <link rel="preload" href="imgs/banner2.jpg" as="image">
    <link rel="preload" href="imgs/banner3.jpg" as="image">
    <link rel="preload" href="imgs/contact.png" as="image">
    <link rel="preload" href="imgs/logo_blanco.png" as="image">
    <link rel="preload" href="imgs/manos.png" as="image">
    <link rel="preload" href="imgs/miniatura.png" as="image">
    <link rel="preload" href="imgs/miniatura2.png" as="image">
    <link rel="preload" href="imgs/newprov.png" as="image">

    <style>
        /* Estilos minimalistas */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #fafafa; display: flex;
            justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #111;
        }
        .loader-container { text-align: center; padding: 20px; }
        
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(0,0,0,0.1);
            border-left-color: #111; border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loading-text { font-size: 1.1rem; font-weight: 500; margin-bottom: 10px; }
        
        .fallback-message {
            opacity: 0; visibility: hidden; transition: opacity 0.8s; margin-top: 20px;
        }
        .fallback-message.show { opacity: 1; visibility: visible; }
        .fallback-message p { font-size: 0.9rem; color: #555; margin-bottom: 15px; }
        
        .lang-links { display: flex; justify-content: center; gap: 20px; }
        .lang-links a {
            text-decoration: none; color: #111; font-weight: bold;
            font-size: 0.9rem; padding: 8px 16px; border: 1px solid #ddd;
            border-radius: 4px; transition: all 0.3s;
        }
        .lang-links a:hover { border-color: #111; background-color: #111; color: #fff; }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <div class="loading-text">Setting up your experience...</div>
        
        <div class="fallback-message" id="fallback">
            <p>If you are not automatically redirected, please select your language:</p>
            <div class="lang-links">
                <a href="es/">Español</a>
                <a href="en/">English</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Array con las rutas EXACTAS de las imágenes críticas
            const imagesToPreload = [
                "imgs/banner1.jpg",
			    "imgs/banner2.jpg",
			    "imgs/banner3.jpg",
			    "imgs/contact.png",
			    "imgs/logo_blanco.png",
			    "imgs/manos.png",
			    "imgs/miniatura.png",
			    "imgs/miniatura2.png",
			    "imgs/newprov.png"
            ];

            // 2. Determinar el idioma
            const userLang = navigator.language || navigator.userLanguage;
            const targetUrl = userLang.toLowerCase().startsWith('en') ? 'es/' : 'en/';

            // 3. Función para cargar una sola imagen como Promesa
            const loadImage = (src) => {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.src = src;
                    img.onload = resolve; // Exito
                    img.onerror = resolve; // Resolvemos también en error para que no se tranque la redirección
                });
            };

            // 4. Crear un array de Promesas
            const imagePromises = imagesToPreload.map(src => loadImage(src));

            // 5. Configurar un temporizador de seguridad (Timeout)
            // Si el internet del usuario es MUY lento, redirigimos a los 3 segundos igual
            const timeoutPromise = new Promise(resolve => setTimeout(resolve, 3000));

            // 6. Ejecutar: Lo que ocurra primero (o se cargan las imágenes o pasan 3 segundos)
            Promise.race([
                Promise.all(imagePromises), // Espera a todas las imágenes
                timeoutPromise              // O espera 3 segundos
            ]).then(() => {
                // Redirección suave
                window.location.replace(targetUrl);
            });

            // 7. Mostrar enlaces manuales si por alguna razón falla el redirect (Fallback de 4 seg)
            setTimeout(() => {
                const fallbackElement = document.getElementById('fallback');
                if (fallbackElement) {
                    fallbackElement.classList.add('show');
                    document.querySelector('.loading-text').innerText = "La conexión está lenta.";
                }
            }, 4000);
        });
    </script>

</body>
</html>
